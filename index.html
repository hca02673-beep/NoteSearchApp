<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ノート情報検索システム</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; text-align: center; padding: 20px; background-color: #fcfcfc; }
        h2 { margin-bottom: 10px; color: #333; }
        
        .description-box {
            font-size: 0.85rem; color: #555; background-color: #f0f0f0;
            padding: 15px; margin: 0 auto 25px auto; width: 90%;
            border-radius: 8px; text-align: left; line-height: 1.5; border: 1px solid #ddd;
        }

        .voice-btn-container { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 15px; width: 95%; margin: 0 auto 15px auto; }
        button.voice-btn {
            font-size: 1rem; padding: 12px 5px; width: 32%; 
            border: none; border-radius: 8px; cursor: pointer; color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #btn-search { background-color: #e1f5fe; }
        #btn-register { background-color: #fff9c4; }
        #btn-audit { background-color: #e8f5e9; border: 2px solid #4CAF50; }

        /* 読み上げコントロールパネルのデザイン修正 */
        .tts-controls {
            display: none; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; margin: 15px auto; 
            padding: 10px; background-color: #333; border-radius: 8px; width: 90%; color: white;
        }
        /* 新設：開始位置の入力エリア */
        .tts-start-inputs { 
            display: flex; align-items: center; gap: 5px; font-size: 0.95rem; 
            background-color: #555; padding: 5px 10px; border-radius: 6px; 
        }
        .tts-start-inputs input { 
            width: 50px; padding: 6px; border-radius: 4px; border: none; 
            text-align: center; font-weight: bold; font-size: 1rem; 
        }

        .tts-btn { font-size: 1rem; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        #btn-play { background-color: #4CAF50; }
        #btn-pause { background-color: #ff9800; }
        #btn-stop { background-color: #f44336; }

        .manual-search-area {
            display: flex; justify-content: center; align-items: center; margin: 15px auto; width: 95%;
        }
        #search-input {
            width: 70%; padding: 10px; font-size: 1.1rem;
            border: 1px solid #ccc; border-radius: 4px 0 0 4px; outline: none;
        }
        #btn-manual-run {
            width: 25%; padding: 10px; font-size: 1rem; background-color: #666; color: white;
            border: none; border-radius: 0 4px 4px 0; cursor: pointer;
        }

        #status { height: 30px; margin: 5px 0; color: #0000ff; font-weight: bold; font-size: 0.9rem; }
        
        #result-area { width: 100%; overflow-x: auto; padding-bottom: 50px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 6px; vertical-align: middle; }
        th { background-color: #f5f5f5; font-size: 0.9rem; white-space: nowrap; }

        .highlight-row td { background-color: #fff59d !important; transition: background-color 0.3s; }

        .col-name { width: 40%; }
        .col-book { width: 15%; text-align: center; }
        .col-page { width: 15%; text-align: center; }
        .col-date { width: 10%; text-align: center; font-size: 0.85rem; color: #666; }
        .col-action { width: 20%; text-align: center; white-space: nowrap; }

        input.edit-name { width: 100%; padding: 8px; font-size: 1.2rem; font-weight: bold; color: #333; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input.edit-num { width: 100%; padding: 8px 0; font-size: 1.2rem; font-weight: bold; color: #444; text-align: center; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .btn-update, .btn-delete, .btn-add { font-size: 0.9rem; padding: 8px 12px; margin: 2px; border: none; border-radius: 4px; cursor: pointer; color: white; }
        .btn-update { background-color: #4CAF50; }
        .btn-add { background-color: #ff9800; }
        .btn-delete { background-color: #f44336; }
    </style>
</head>
<body>
    <h2>ノート情報検索システム</h2>
    
    <div class="description-box">
        現実世界のノートに記載された各種情報を、〇冊目〇ページという形式でオンライン上に記録し、情報名で検索できるようにするプログラム。<br>
        記録も検索も音声で実施する。<br>
        データベースはGoogleスプレッドシート（IDPW索引データ）に記録され、当該シートは手作業でも編集できる。
    </div>

    <div class="voice-btn-container">
        <button id="btn-search" class="voice-btn" onclick="startVoice('search')">🎤 音声検索<br><small>（サービス名）</small></button>
        <button id="btn-register" class="voice-btn" onclick="startVoice('register')">🎤 音声登録<br><small>（冊・頁・名前）</small></button>
        <button id="btn-audit" class="voice-btn" onclick="startAudit()">📋 精査モード<br><small>（全件読上）</small></button>
    </div>

    <div id="tts-controls" class="tts-controls">
        <div class="tts-start-inputs">
            <input type="number" id="start-book" placeholder="冊" min="1"> 冊
            <input type="number" id="start-page" placeholder="頁" min="0"> 頁 から
        </div>
        <button id="btn-play" class="tts-btn" onclick="playReading()">▶ 再生/再開</button>
        <button id="btn-pause" class="tts-btn" onclick="pauseReading()">⏸ 一時停止</button>
        <button id="btn-stop" class="tts-btn" onclick="stopReading()">⏹ 停止</button>
    </div>

    <div class="manual-search-area">
        <input type="text" id="search-input" placeholder="ここに認識文字が入ります">
        <button id="btn-manual-run" onclick="manualSearch()">再検索</button>
    </div>

    <div id="status">ボタンを押して話してください</div>

    <div id="result-area">
        <table id="result-table">
            <thead>
                <tr>
                    <th class="col-name">サービス名</th>
                    <th class="col-book">冊</th>
                    <th class="col-page">頁</th>
                    <th class="col-date">日付</th>
                    <th class="col-action">操作</th>
                </tr>
            </thead>
            <tbody id="result-body"></tbody>
        </table>
    </div>

    <script>
        // ==========================================
        // ↓↓↓ 取得したGASのWebアプリURLを以下に設定 ↓↓↓
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbydVLLtEb_ZJuGN7y7O8rrgePpGWdJvfGXuX21LDo6jLSsK6ouS1OTMq2EN1cZJC1qzgg/exec';
        // ==========================================

        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';

        let mode = '';
        let audioCtx = null;
        let lastSearchQuery = '';

        // TTS用変数
        let readingIndex = 0;
        let totalRows = 0;
        let isReading = false;
        let isPaused = false;
        const synth = window.speechSynthesis;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'success') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function callGasApi(action, payload, onSuccess) {
            document.getElementById('status').innerText = "通信中...";
            document.getElementById('status').style.color = "#555";
            payload.action = action;

            fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    onSuccess(data);
                } else {
                    handleError("サーバーエラー: " + data.message);
                }
            })
            .catch(error => {
                handleError("通信エラーが発生しました");
                console.error(error);
            });
        }

        function startVoice(m) {
            stopReading();
            initAudio();
            mode = m;
            
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(function(stream) {
                    stream.getTracks().forEach(track => track.stop());
                    recognition.start();
                    document.getElementById('status').innerText = "聴取中...";
                    document.getElementById('status').style.color = "#555";
                })
                .catch(function(err) {
                    alert("マイクの使用がブロックされています。\nブラウザのアドレスバー左側のアイコンをクリックし、マイクを「許可」に変更してください。");
                });
        }

        function manualSearch() {
            stopReading();
            const text = document.getElementById('search-input').value;
            if(text !== "") {
                lastSearchQuery = text;
                callGasApi('search', { query: text }, data => showSearchResults(data.data, false));
            }
        }

        function startAudit() {
            stopReading();
            document.getElementById('search-input').value = '';
            document.getElementById('status').innerText = "全件取得＆並び替え中...";
            
            callGasApi('search', { query: '' }, data => {
                let sortedData = data.data.sort((a, b) => {
                    const b1 = parseInt(a.book) || 0;
                    const b2 = parseInt(b.book) || 0;
                    if (b1 !== b2) return b1 - b2;
                    
                    const p1 = parseInt(a.page) || 0;
                    const p2 = parseInt(b.page) || 0;
                    return p1 - p2;
                });
                showSearchResults(sortedData, true); 
            });
        }

        // ==========================================
        // 変更箇所：再生開始時に冊数・ページをチェックする
        // ==========================================
        function playReading() {
            if (totalRows === 0) return;
            
            // 既に一時停止中なら、そのまま再開
            if (isPaused) {
                synth.resume(); 
                isPaused = false;
                document.getElementById('status').innerText = "読み上げ再開...";
                return;
            }
            
            // 新規に再生ボタンを押したときの処理
            let startIndex = readingIndex; 

            if (!isReading) {
                startIndex = 0;
                const startBookVal = document.getElementById('start-book').value;
                const startPageVal = document.getElementById('start-page').value;

                // 入力ボックスに値がある場合は、該当する行を探す
                if (startBookVal !== "") {
                    const sb = parseInt(startBookVal);
                    const sp = startPageVal !== "" ? parseInt(startPageVal) : 0; 

                    const rows = document.querySelectorAll('#result-body tr');
                    for (let i = 0; i < rows.length; i++) {
                        const inputs = rows[i].querySelectorAll('.edit-num');
                        if(inputs.length >= 2) {
                            const b = parseInt(inputs[0].value) || 0;
                            const p = parseInt(inputs[1].value) || 0;
                            
                            // 指定した冊数・ページ数「以上」のデータを見つけたらそこを開始位置に設定
                            if (b > sb || (b === sb && p >= sp)) {
                                startIndex = i;
                                break;
                            }
                        }
                    }
                }
            }
            
            readingIndex = startIndex;
            if (readingIndex >= totalRows) {
                readingIndex = 0; // 最後まで行っていたら最初から
            }
            
            isReading = true;
            isPaused = false;
            document.getElementById('status').innerText = "精査読み上げ中...";
            readNextRow();
        }

        function pauseReading() {
            if (isReading && !isPaused) {
                synth.pause();
                isPaused = true;
                document.getElementById('status').innerText = "読み上げ一時停止中（編集可能です）";
            }
        }

        function stopReading() {
            synth.cancel();
            isReading = false;
            isPaused = false;
            readingIndex = 0;
            clearHighlight();
            if(document.getElementById('status').innerText.includes("読み上げ")) {
                document.getElementById('status').innerText = "待機中";
            }
        }

        function clearHighlight() {
            const rows = document.querySelectorAll('#result-body tr');
            rows.forEach(r => r.classList.remove('highlight-row'));
        }

        function readNextRow() {
            if (!isReading) return;
            clearHighlight();

            if (readingIndex >= totalRows) {
                stopReading();
                document.getElementById('status').innerText = "全件の精査が完了しました";
                playSound('success');
                return;
            }

            const prefix = 'row-' + readingIndex;
            const tr = document.getElementById('tr-' + prefix);
            if(tr) {
                tr.classList.add('highlight-row');
                tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            const name = document.getElementById(prefix + '-name').value;
            const book = document.getElementById(prefix + '-book').value;
            const page = document.getElementById(prefix + '-page').value;

            const text = `${book}冊目、${page}ページ、${name}`;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            utterance.rate = 1.0; 

            utterance.onend = () => {
                readingIndex++;
                setTimeout(() => {
                    if(isReading && !isPaused) readNextRow();
                }, 500);
            };

            utterance.onerror = (e) => {
                console.error("TTS Error", e);
                readingIndex++;
                setTimeout(() => { if(isReading && !isPaused) readNextRow(); }, 500);
            };

            synth.speak(utterance);
        }

        // ==========================================

        function saveRow(rowIndex, prefix) {
            const newName = document.getElementById(prefix + '-name').value;
            const newBook = document.getElementById(prefix + '-book').value;
            const newPage = document.getElementById(prefix + '-page').value;

            if(!newName || !newBook || !newPage) {
                alert("サービス名、冊数、ページのすべてを入力してください。");
                return;
            }

            if (rowIndex === null || rowIndex === 'null') {
                callGasApi('add', { name: newName, book: parseInt(newBook), page: parseInt(newPage) }, data => {
                    updateStatusSuccess("手動で登録しました");
                    showSearchResults([data.data], false);
                });
            } else {
                callGasApi('update', { rowIndex: rowIndex, newName: newName, newBook: parseInt(newBook), newPage: parseInt(newPage) }, data => {
                    updateStatusSuccess("内容を保存しました。再生ボタンで続きから読み上げます。");
                    playSound('success');
                });
            }
        }

        function deleteRow(rowIndex, name) {
            if (rowIndex === null || rowIndex === 'null') {
                document.getElementById('result-body').innerHTML = '';
                updateStatusSuccess("登録をキャンセルしました");
                return;
            }

            if(confirm("「" + name + "」を完全に削除しますか？\n（この操作は元に戻せません）")) {
                callGasApi('delete', { rowIndex: rowIndex }, data => {
                    updateStatusSuccess("削除しました");
                    manualSearch(); 
                });
            }
        }

        recognition.onresult = (event) => {
            let rawText = event.results[0][0].transcript;
            rawText = rawText.replace(/　/g, " ").trim();
            document.getElementById('status').innerText = "認識完了処理中...";

            if (mode === 'search') {
                document.getElementById('search-input').value = rawText;
                lastSearchQuery = rawText;
                callGasApi('search', { query: rawText }, data => showSearchResults(data.data, false));
            
            } else if (mode === 'register') {
                const match = rawText.match(/^(.+?)\s*冊目\s*(?:の)?\s*(.+?)\s*ペ[ーイ]ジ\s*(.+)/);
                if (match) {
                    const rawBook = match[1];
                    const rawPage = match[2];
                    const name = match[3].trim();
                    const toNum = (s) => {
                        let res = s;
                        res = res.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
                        res = res.replace(/[イい][ッっ]/g, '1').replace(/[ロろ][ッっ]/g, '6');
                        res = res.replace(/[ハは][ッっ]/g, '8').replace(/[ジじ][ュゅ][ッっ]/g, '10');
                        res = res.replace(/[ジじ][ュゅ]ウ/g, '10').replace(/[キき][ュゅ]/g, '9');
                        res = res.replace(/イチ/g, '1').replace(/ニ/g, '2').replace(/サン/g, '3')
                                 .replace(/ヨン/g, '4').replace(/ゴ/g, '5').replace(/ロク/g, '6')
                                 .replace(/ナナ/g, '7').replace(/ハチ/g, '8').replace(/キュウ/g, '9')
                                 .replace(/ジュウ/g, '10').replace(/ゼロ/g, '0');
                        res = res.replace(/一/g,'1').replace(/二/g,'2').replace(/三/g,'3')
                                 .replace(/四/g,'4').replace(/五/g,'5').replace(/六/g,'6')
                                 .replace(/七/g,'7').replace(/八/g,'8').replace(/九/g,'9')
                                 .replace(/十/g,'10');
                        res = res.replace(/([2-9])10/g, '$10').replace(/10([0-9])/g, '1$1');
                        return res;
                    };

                    const bookNum = parseInt(toNum(rawBook));
                    const pageNum = parseInt(toNum(rawPage));

                    if (!isNaN(bookNum) && bookNum >= 1 && bookNum <= 9 && !isNaN(pageNum) && pageNum >= 0 && pageNum <= 99) {
                        callGasApi('add', { name: name, book: bookNum, page: pageNum }, data => {
                            updateStatusSuccess("音声登録に成功しました（内容を修正可能です）");
                            showSearchResults([data.data], false);
                        });
                    } else {
                        renderBlankRow();
                    }
                } else {
                    renderBlankRow();
                }
            }
        };

        function renderBlankRow() {
            handleError("認識に失敗しました。手動で入力して登録してください。");
            showSearchResults([{ rowIndex: null, name: '', book: '', page: '', date: '未登録' }], false);
        }

        function showSearchResults(results, isAuditMode = false) {
            const tbody = document.getElementById('result-body');
            tbody.innerHTML = ''; 
            
            totalRows = results ? results.length : 0;
            
            if (isAuditMode) {
                document.getElementById('tts-controls').style.display = 'flex';
                readingIndex = 0;
                document.getElementById('status').innerText = `${totalRows}件のデータを冊・ページ順に並べ替えました。再生ボタンで開始します。`;
            } else {
                document.getElementById('tts-controls').style.display = 'none';
                stopReading();
            }

            if (results && results.length > 0) {
                results.forEach((row, index) => {
                    const prefix = 'row-' + index;
                    const rIndex = row.rowIndex ? row.rowIndex : null;
                    const btnText = rIndex ? '保存' : '登録';
                    const btnClass = rIndex ? 'btn-update' : 'btn-add';

                    const tr = `<tr id="tr-${prefix}">
                        <td class="col-name">
                            <input type="text" id="${prefix}-name" class="edit-name" value="${row.name}">
                        </td>
                        <td class="col-book">
                            <input type="number" id="${prefix}-book" class="edit-num" value="${row.book}">
                        </td>
                        <td class="col-page">
                            <input type="number" id="${prefix}-page" class="edit-num" value="${row.page}">
                        </td>
                        <td class="col-date">${row.date}</td>
                        <td class="col-action">
                            <button class="${btnClass}" onclick="saveRow(${rIndex}, '${prefix}')">${btnText}</button>
                            <button class="btn-delete" onclick="deleteRow(${rIndex}, '${row.name}')">削除</button>
                        </td>
                    </tr>`;
                    tbody.insertAdjacentHTML('beforeend', tr);
                });

                if(mode === 'search' && !isAuditMode) {
                    document.getElementById('status').innerText = results.length + "件ヒット";
                    document.getElementById('status').style.color = "blue";
                    playSound('success');
                }
            } else {
                handleError("見つかりませんでした");
            }
        }

        function updateStatusSuccess(msg) {
            document.getElementById('status').innerText = msg;
            document.getElementById('status').style.color = "blue";
        }

        function handleError(msg) {
            document.getElementById('status').innerText = msg;
            document.getElementById('status').style.color = "red";
            playSound('error');
        }
    </script>
</body>
</html>
